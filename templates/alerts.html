{% extends "base.html" %}
{% block page_title %}Alerts{% endblock %}
{% block content %}
<div class="container-fluid">
    <h2 class="mb-3"><i class="bi bi-bell"></i> Alerts & Notifications</h2>
    
    <!-- Stats Row -->
    <div class="row g-3 mb-3">
        <div class="col-6 col-md-3">
            <div class="card text-center">
                <div class="card-body">
                    <small class="text-muted d-block">Total Today</small>
                    <h5 class="mb-0" id="alert-count-today">0</h5>
                </div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="card text-center">
                <div class="card-body">
                    <small class="text-muted d-block">Unread</small>
                    <h5 class="mb-0 text-warning" id="alert-count-unread">0</h5>
                </div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="card text-center">
                <div class="card-body">
                    <small class="text-muted d-block">Critical</small>
                    <h5 class="mb-0 text-danger" id="alert-count-critical">0</h5>
                </div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="card text-center">
                <div class="card-body">
                    <small class="text-muted d-block">Trades</small>
                    <h5 class="mb-0 text-success" id="alert-count-trades">0</h5>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Alerts List -->
    <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
            <span><i class="bi bi-bell"></i> Recent Alerts</span>
            <div>
                <button class="btn btn-sm btn-outline-success me-2" onclick="markAllRead()">
                    <i class="bi bi-check-all"></i> Mark All Read
                </button>
                <button class="btn btn-sm btn-outline-danger" onclick="clearAll()">
                    <i class="bi bi-trash"></i> Clear
                </button>
            </div>
        </div>
        <div class="card-body" id="alerts-container">
            <div class="text-center py-5">
                <div class="spinner-border"></div>
                <p class="text-muted mt-2">Loading alerts...</p>
            </div>
        </div>
    </div>

    <!-- Alert Settings -->
    <div class="card mt-3">
        <div class="card-header"><i class="bi bi-gear"></i> Alert Settings</div>
        <div class="card-body">
            <div class="row g-3">
                <div class="col-md-6">
                    <h6 class="text-muted">Trading Alerts</h6>
                    <div class="form-check form-switch mb-2">
                        <input class="form-check-input" type="checkbox" id="alert-trade" checked onchange="saveAlertSetting('trade', this.checked)">
                        <label class="form-check-label" for="alert-trade">Trade executed</label>
                    </div>
                    <div class="form-check form-switch mb-2">
                        <input class="form-check-input" type="checkbox" id="alert-stoploss" checked onchange="saveAlertSetting('stoploss', this.checked)">
                        <label class="form-check-label" for="alert-stoploss">Stop loss triggered</label>
                    </div>
                    <div class="form-check form-switch mb-2">
                        <input class="form-check-input" type="checkbox" id="alert-takeprofit" checked onchange="saveAlertSetting('takeprofit', this.checked)">
                        <label class="form-check-label" for="alert-takeprofit">Take profit hit</label>
                    </div>
                </div>
                <div class="col-md-6">
                    <h6 class="text-muted">System Alerts</h6>
                    <div class="form-check form-switch mb-2">
                        <input class="form-check-input" type="checkbox" id="alert-spread" checked onchange="saveAlertSetting('spread', this.checked)">
                        <label class="form-check-label" for="alert-spread">Large spread detected</label>
                    </div>
                    <div class="form-check form-switch mb-2">
                        <input class="form-check-input" type="checkbox" id="alert-error" checked onchange="saveAlertSetting('error', this.checked)">
                        <label class="form-check-label" for="alert-error">Errors & Warnings</label>
                    </div>
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" id="alert-ai" checked onchange="saveAlertSetting('ai', this.checked)">
                        <label class="form-check-label" for="alert-ai">AI Signals</label>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
let alerts = [];
let alertSettings = JSON.parse(localStorage.getItem('alertSettings') || '{}');

// Load alerts on page load
document.addEventListener('DOMContentLoaded', () => {
    loadAlerts();
    loadAlertSettings();
    setInterval(loadAlerts, 30000); // Refresh every 30s
});

async function loadAlerts() {
    try {
        const resp = await fetch('/api/alerts');
        const data = await resp.json();
        
        if (data.success) {
            alerts = data.alerts || [];
            renderAlerts();
            updateStats();
        }
    } catch (e) {
        console.error('Failed to load alerts:', e);
        document.getElementById('alerts-container').innerHTML = `
            <div class="alert alert-danger">
                <i class="bi bi-exclamation-triangle"></i> Failed to load alerts
            </div>
        `;
    }
}

function renderAlerts() {
    const container = document.getElementById('alerts-container');
    
    if (alerts.length === 0) {
        container.innerHTML = `
            <div class="text-center text-muted py-5">
                <i class="bi bi-bell-slash fs-1 d-block mb-2"></i>
                <p>No alerts yet</p>
                <small>Alerts will appear when trading events occur</small>
            </div>
        `;
        return;
    }
    
    container.innerHTML = alerts.map((alert, idx) => `
        <div class="alert alert-${alert.type || 'info'} d-flex align-items-start ${alert.read ? '' : 'border-warning'}" id="alert-${idx}">
            <i class="bi bi-${getAlertIcon(alert.type)} me-2 mt-1"></i>
            <div class="flex-grow-1">
                <div class="d-flex justify-content-between align-items-start">
                    <strong>${alert.title}</strong>
                    <div class="dropdown">
                        <button class="btn btn-sm btn-link text-muted" data-bs-toggle="dropdown">
                            <i class="bi bi-three-dots-vertical"></i>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-dark dropdown-menu-end">
                            ${!alert.read ? `<li><a class="dropdown-item" href="#" onclick="markRead(${idx}); return false;"><i class="bi bi-check"></i> Mark read</a></li>` : ''}
                            <li><a class="dropdown-item text-danger" href="#" onclick="deleteAlert(${idx}); return false;"><i class="bi bi-trash"></i> Delete</a></li>
                        </ul>
                    </div>
                </div>
                <p class="mb-1">${alert.message}</p>
                <div class="d-flex justify-content-between align-items-center">
                    <small class="text-muted">${formatTime(alert.timestamp)}</small>
                    ${!alert.read ? '<span class="badge bg-warning text-dark">New</span>' : ''}
                </div>
            </div>
        </div>
    `).join('');
}

function getAlertIcon(type) {
    const icons = {
        'success': 'check-circle',
        'danger': 'exclamation-triangle',
        'warning': 'exclamation-circle',
        'info': 'info-circle',
        'trade': 'arrow-left-right',
        'signal': 'magic'
    };
    return icons[type] || 'bell';
}

function formatTime(timestamp) {
    if (!timestamp) return 'Unknown';
    const date = new Date(timestamp);
    const now = new Date();
    const diff = now - date;
    
    if (diff < 60000) return 'Just now';
    if (diff < 3600000) return `${Math.floor(diff / 60000)}m ago`;
    if (diff < 86400000) return `${Math.floor(diff / 3600000)}h ago`;
    return date.toLocaleDateString();
}

function updateStats() {
    const today = new Date().toDateString();
    const todayAlerts = alerts.filter(a => new Date(a.timestamp).toDateString() === today);
    
    document.getElementById('alert-count-today').textContent = todayAlerts.length;
    document.getElementById('alert-count-unread').textContent = alerts.filter(a => !a.read).length;
    document.getElementById('alert-count-critical').textContent = alerts.filter(a => a.type === 'danger').length;
    document.getElementById('alert-count-trades').textContent = alerts.filter(a => a.category === 'trade').length;
}

async function markRead(idx) {
    try {
        await fetch(`/api/alerts/${idx}/read`, {method: 'POST'});
        alerts[idx].read = true;
        renderAlerts();
        updateStats();
    } catch (e) {
        console.error('Failed to mark read:', e);
    }
}

async function markAllRead() {
    try {
        await fetch('/api/alerts/read-all', {method: 'POST'});
        alerts.forEach(a => a.read = true);
        renderAlerts();
        updateStats();
        showToast('All alerts marked as read', 'success');
    } catch (e) {
        console.error('Failed to mark all read:', e);
    }
}

async function deleteAlert(idx) {
    try {
        await fetch(`/api/alerts/${idx}`, {method: 'DELETE'});
        alerts.splice(idx, 1);
        renderAlerts();
        updateStats();
    } catch (e) {
        console.error('Failed to delete alert:', e);
    }
}

async function clearAll() {
    if (!confirm('Clear all alerts?')) return;
    
    try {
        await fetch('/api/alerts/clear', {method: 'POST'});
        alerts = [];
        renderAlerts();
        updateStats();
        showToast('All alerts cleared', 'success');
    } catch (e) {
        console.error('Failed to clear alerts:', e);
    }
}

function saveAlertSetting(key, value) {
    alertSettings[key] = value;
    localStorage.setItem('alertSettings', JSON.stringify(alertSettings));
    
    // Sync to backend
    fetch('/api/alerts/settings', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({key, value})
    }).catch(() => {});
}

function loadAlertSettings() {
    Object.entries(alertSettings).forEach(([key, value]) => {
        const el = document.getElementById(`alert-${key}`);
        if (el) el.checked = value;
    });
}

function showToast(message, type) {
    if (window.showToast) window.showToast(message, type);
}
</script>
{% endblock %}

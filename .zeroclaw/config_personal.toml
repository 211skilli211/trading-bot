[observability]
backend = "none"

[autonomy]
level = "supervised"
workspace_only = true
allowed_commands = [
    "git",
    "npm",
    "ls",
    "cat",
    "grep",
    "echo",
    "python3",
]
forbidden_paths = [
    "/etc",
    "/root",
    "/home",
    "/usr",
    "/bin",
    "/sbin",
    "/lib",
    "/opt",
    "/boot",
    "/dev",
    "/proc",
    "/sys",
    "/var",
    "/tmp",
    "~/.ssh",
    "~/.gnupg",
]
max_actions_per_hour = 200
max_cost_per_day_cents = 2500
require_approval_for_medium_risk = true
block_high_risk_commands = true

[runtime]
kind = "native"

[reliability]
provider_retries = 2
provider_backoff_ms = 500

[scheduler]
enabled = true
max_tasks = 64
max_concurrent = 4

[agent]
compact_context = true
max_tool_iterations = 50
max_history_messages = 20
bootstrap_max_chars = 6000
bootstrap_total_max_chars = 30000

[heartbeat]
enabled = false

[cron]

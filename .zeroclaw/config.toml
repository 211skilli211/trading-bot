[[model_routes]]
hint = "fast"
provider = "openrouter"
model = "arcee-ai/trinity-large-preview:free"

[model_providers]

[observability]
backend = "none"
runtime_trace_mode = "none"
runtime_trace_path = "state/runtime-trace.jsonl"
runtime_trace_max_entries = 200

# INCREASED RATE LIMITS (was 20/hr, $5/day)
[autonomy]
level = "supervised"
workspace_only = false
allowed_commands = [
    "python3",
    "pip",
    "curl",
    "grep",
    "cat",
    "echo",
    "date",
]
forbidden_paths = [
    "/etc",
    "/usr",
    "/bin",
    "/sbin",
    "/lib",
    "/opt",
    "/boot",
    "/dev",
    "/proc",
    "/sys",
    "/var",
]
max_actions_per_hour = 200
max_cost_per_day_cents = 2500
require_approval_for_medium_risk = true
block_high_risk_commands = true

[security.sandbox]
backend = "none"

[security.resources]
max_memory_mb = 1024
max_cpu_time_seconds = 120
max_subprocesses = 20

[security.audit]
enabled = true
log_path = ".zeroclaw/audit.log"
max_size_mb = 100

[reliability]
provider_retries = 2
provider_backoff_ms = 500
channel_initial_backoff_secs = 2
channel_max_backoff_secs = 60
scheduler_poll_secs = 15

[scheduler]
enabled = true
max_tasks = 32
max_concurrent = 4

# CONTEXT COMPRESSION ENABLED
[agent]
compact_context = true
max_tool_iterations = 50
max_history_messages = 20

[skills]
open_skills_enabled = false
skills_dir = ".zeroclaw/skills"
auto_load = true

[heartbeat]
enabled = true
interval_minutes = 5

[cron]
enabled = true
max_run_history = 50

[channels_config]
cli = true
message_timeout_secs = 300

[channels_config.telegram]
bot_token = "8795904321:AAEDGfDZDsHtMo9337mnSZW96d_iOx5n3As"
allowed_users = ["8797355217"]

# Model routing
[[model_routes]]
hint = "default"
provider = "openrouter"
model = "openrouter/openrouter/auto"

[[model_routes]]
hint = "fast"
provider = "openrouter"
model = "arcee-ai/trinity-large-preview:free"

[model_providers]

[observability]
backend = "none"

[autonomy]
level = "supervised"
workspace_only = true
allowed_commands = [
    "python3",
    "pip",
    "curl",
    "grep",
    "cat",
    "echo",
    "date",
]
forbidden_paths = [
    "/etc",
    "/usr",
    "/bin",
    "/sbin",
    "/lib",
    "/opt",
    "/boot",
    "/dev",
    "/proc",
    "/sys",
    "/var",
    "/root",
    "/home",
    "~/.ssh",
    "~/.gnupg",
]
max_actions_per_hour = 200
max_cost_per_day_cents = 2500
require_approval_for_medium_risk = true
block_high_risk_commands = true

[security.sandbox]
backend = "none"

[security.resources]
max_memory_mb = 1024
max_cpu_time_seconds = 120
max_subprocesses = 20

[security.audit]
enabled = true
log_path = ".zeroclaw/audit.log"
max_size_mb = 100

[reliability]
provider_retries = 2
provider_backoff_ms = 500

[scheduler]
enabled = true
max_tasks = 32
max_concurrent = 4

[agent]
compact_context = true
max_tool_iterations = 50
max_history_messages = 20
bootstrap_max_chars = 6000
bootstrap_total_max_chars = 30000

[skills]
open_skills_enabled = false
skills_dir = ".zeroclaw/skills"
auto_load = true

[heartbeat]
enabled = true
interval_minutes = 5

[cron]
enabled = true
max_run_history = 50
max_concurrent_jobs = 1
retry_attempts = 2

[channels_config]
cli = true
message_timeout_secs = 300

[channels_config.telegram]
bot_token = "8795904321:AAEDGfDZDsHtMo9337mnSZW96d_iOx5n3As"
allowed_users = ["8797355217"]
stream_mode = "off"
rate_limit_per_minute = 10
interrupt_on_new_message = false

[memory]
backend = "markdown"
auto_save = true

[memory.markdown]
vault_path = "/storage/emulated/0/Obsidian_notes/211"
memory_subfolder = "zeroclaw-memory"

[gateway]
port = 3001
host = "127.0.0.1"
require_pairing = false

[trading]
enabled = true
mode = "paper"

[composio]
enabled = false

[browser]
enabled = false

[web_search]
enabled = true
provider = "duckduckgo"
max_results = 5

[web_fetch]
enabled = true
allowed_domains = ["*"]

[cost]
enabled = true
daily_limit_usd = 25.00

[agents.defaults]
model.primary = "openrouter/openrouter/auto"
model.fallbacks = ["openrouter/anthropic/claude-haiku-3.5", "arcee-ai/trinity-large-preview:free"]

[agents.defaults.models."openrouter/openrouter/auto"]
[agents.defaults.models."openrouter/anthropic/claude-haiku-3.5"]
[agents.defaults.models."arcee-ai/trinity-large-preview:free"]

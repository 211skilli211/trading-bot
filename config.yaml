                    max_position_usd: 10
                    min_price_change_pct: 2
                    name: Momentum
                    sma_fast: 20
                    sma_slow: 50
                    stop_loss_pct: 0.019200000000000002
                    symbols:
                    - BTC/USDT
                    - ETH/USDT
                    - SOL/USDT
                    - BNB/USDT
                    take_profit_pct: 0.0441
                    volume_threshold: 1.5
                  pairs_trading:
                    description: Statistical arbitrage between correlated pairs
                    enabled: false
                    entry_zscore: 2
                    exit_zscore: 0.5
                    lookback_period: 100
                    max_position_usd: 10
                    name: Pairs Trading
                    pair_1: BTC/USDT
                    pair_2: ETH/USDT
                    stop_loss_zscore: 3.5
                  scalping:
                    description: Quick trades on small price movements
                    enabled: false
                    max_hold_time_minutes: 5
                    max_position_usd: 10
                    min_spread: 0.05
                    name: Scalping
                    profit_target_pct: 0.1
                    symbols:
                    - BTC/USDT
                    - ETH/USDT
                    timeframe: 1m
                  sniper:
                    allowed_tokens:
                    - BTC
                    - ETH
                    - SOL
                    circuit_breaker_losses: 3
                    description: Momentum sniper for 15-min markets
                    enabled: true
                    entry_window_seconds: 60
                    max_concurrent_trades: 3
                    max_position_usd: 10
                    momentum_threshold: 0.1
                    name: 15-Min Sniper
                  vwap_reversion:
                    description: Mean reversion to VWAP
                    enabled: true
                    max_position_usd: 10
                    name: VWAP Reversion
                    std_dev_entry: 2
                    std_dev_exit: 0.5
                    symbols:
                    - BTC/USDT
                    - ETH/USDT
                    vwap_period: 1d
                strategy:
                  min_spread: 0.01
